name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  quality:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      - name: Validate i18n
        run: npm run validate:i18n

      - name: Extension tests
        run: npm run test
